site_name: langgraph-kit
site_url: https://allada-homelab.github.io/langgraph-kit/
repo_url: https://github.com/allada-homelab/langgraph-kit
repo_name: allada-homelab/langgraph-kit
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  # ``--8<-- "examples/<name>.py"`` includes the runnable example file
  # verbatim. Pulls from the examples/ directory at the repo root so
  # docs and smoke-test runner share one source of truth.
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true

