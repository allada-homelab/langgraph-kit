docs:
  - all:
    - changed-files:
      - any-glob-to-any-file:
        - '**/*.md'
        - 'docs/**'
        - 'mkdocs.yml'
      - all-globs-to-all-files:
        - '!.github/**'
        - '!scripts/**'
        - '!.gitignore'
        - '!.pre-commit-config.yaml'

internal:
  - all:
    - changed-files:
      - any-glob-to-any-file:
        - .github/**
        - scripts/**
        - .gitignore
        - .pre-commit-config.yaml
        - justfile
      - all-globs-to-all-files:
        - '!./**/*.md'
        - '!docs/**'
        - '!mkdocs.yml'
