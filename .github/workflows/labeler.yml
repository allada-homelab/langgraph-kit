name: Labels
on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      # For label-checker
      - labeled
      - unlabeled

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/labeler@v6
      if: ${{ github.event.action != 'labeled' && github.event.action != 'unlabeled' }}
    - run: echo "Done adding labels"
  # Run this after labeler applied labels
  check-labels:
    needs:
      - labeler
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        # Authenticated pulls lift the anonymous rate limit (100 pulls / 6h
        # per IP, trivially exhausted by a self-hosted runner pool) to 10k/6h.
        # Required here because this job pulls agilepathway/pull-request-label-checker
        # from Docker Hub via the ``docker://`` action syntax.
        # Skipped when secrets are unavailable (e.g. Dependabot PRs) — falls
        # back to anonymous pulls. Note: ``secrets`` context is not available in
        # ``if:`` expressions, so we promote to env first and gate on that.
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker://agilepathway/pull-request-label-checker:latest
        with:
          one_of: breaking,security,feature,bug,refactor,upgrade,docs,internal
          repo_token: ${{ secrets.GITHUB_TOKEN }}
