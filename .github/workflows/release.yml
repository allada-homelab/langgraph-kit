name: release

# Trigger options:
#
# - ``release: published`` — the primary path. Draft a new release in
#   GitHub's UI, pick a tag (``vX.Y.Z``), click "Publish release". This
#   workflow extracts the version from the tag, overwrites
#   ``__version__.py`` to match (so the wheel, sdist, and PyPI metadata
#   all agree regardless of what main's ``__version__.py`` currently says),
#   builds, publishes to PyPI, attaches artifacts to the drafted release
#   (without touching its body), and commits the version bump back to
#   main so future development starts from the right number.
#
# - ``push: tags: v*`` — the fallback for ad-hoc ``git tag + git push``
#   releases. Same version-sync, build, publish, and main-bump logic
#   runs, plus it creates a GitHub Release populated with the matching
#   CHANGELOG section (or auto-generated notes if no section matches).
#
# When a release publish also produces a tag push (``gh release create``
# or UI "Publish release"), both triggers fire. The ``gate`` job on the
# push-event run detects that the release already exists and exits
# early, letting the release-event run do the work.

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

# ``gh release create`` and GitHub's UI "Publish release" both fire a
# tag push AND a release:published event. The ``gate`` job below
# detects that case (release already exists for the tag) and exits
# early on the push-event run, letting the release-event run do the
# work. This keeps ``bump-main`` and "don't overwrite the drafted
# release body" on the release-event path.
#
# Concurrency groups are scoped per event type so a push-event run
# and a release-event run for the same tag don't cancel each other;
# same-event duplicate triggers (rapid re-publishes, re-pushes) are
# still deduplicated.
concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # Decide whether this run should proceed. On push-tag events, defer
  # to the release-event run if a GitHub Release already exists for the
  # tag (meaning the push was half of a ``gh release create`` / UI
  # publish pair). On release events, always proceed. On tag-only
  # pushes with no release, proceed and let the workflow create the
  # release.
  gate:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Skip if release-event path will handle this tag
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — deferring to release:published run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No release for $TAG — proceeding with tag-push path."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Derive version from tag
        id: v
        run: |
          # ``github.event.release.tag_name`` exists on release events;
          # ``GITHUB_REF`` carries ``refs/tags/vX.Y.Z`` on tag pushes.
          # Fall back through both so either trigger works.
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::tag '$TAG' does not parse as vX.Y.Z"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Derived VERSION=$VERSION from tag $TAG"
      - name: Sync __version__.py to tag version
        # Idempotent: if ``__version__.py`` already matches, the write is
        # a no-op. If it doesn't, we overwrite so the wheel metadata
        # always matches the release label — prevents the "tag says 0.7.0,
        # wheel says 0.6.1, PyPI 400s on duplicate" failure mode.
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          echo "__version__ = \"$VERSION\"" > src/langgraph_kit/__version__.py
          cat src/langgraph_kit/__version__.py
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/langgraph-kit
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      # ``skip-existing`` lets a re-run of the same release (or a
      # tag-push that raced with the release-event path) no-op rather
      # than 400 on "File already exists". Idempotency > strictness
      # here since PyPI versions are immutable anyway.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # Pull just the section for this version — lines between
          # ``## [X.Y.Z]`` and the next ``## [`` header, heading excluded.
          awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]" { flag=1; next }
            /^## \[/ { flag=0 }
            flag { print }
          ' CHANGELOG.md \
            | awk 'NF || seen; NF { seen=1 } END { print "" }' \
            | sed -e ':a' -e '/^\n*$/{$d;N;ba' -e '}' \
            > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            echo "No CHANGELOG entry for $VERSION — falling back to auto-generated notes." >&2
            echo "use_auto=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_auto=false" >> "$GITHUB_OUTPUT"
            echo "Extracted $(wc -l < /tmp/notes.md) lines of notes for v$VERSION."
          fi
      # ``softprops/action-gh-release`` handles both paths cleanly:
      #
      # - On ``release: published``, GitHub already has a release for this
      #   tag; the action attaches ``files`` to it. We don't overwrite the
      #   body (the human who drafted the release likely customized it).
      # - On ``push: tags``, there's no existing release; the action creates
      #   one with the CHANGELOG body (or auto-generated notes fallback).
      - name: Attach artifacts to release (release-event path)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          # ``tag_name`` pins the action to the existing release rather than
          # inferring from the (present) push context.
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*
      - name: Create GitHub Release with CHANGELOG notes (tag-push path)
        if: github.event_name == 'push' && steps.changelog.outputs.use_auto != 'true'
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/notes.md
          files: dist/*
      - name: Create GitHub Release with auto notes (tag-push fallback)
        if: github.event_name == 'push' && steps.changelog.outputs.use_auto == 'true'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*

  bump-main:
    # After a successful publish, propagate the version bump back to main
    # so future development starts from the post-release version.
    #
    # Direct push is impossible under main's branch protection (required
    # status checks reject any push that hasn't run them — and a bare
    # ``git push`` from the bot can't satisfy them). The earlier direct-
    # push implementation silently failed every release after v0.9.10,
    # leaving ``__version__.py`` stale on main while published wheels
    # were correct (the build job rewrites the constant before
    # ``uv build``, so PyPI artifacts always match the tag).
    #
    # Two-tier strategy:
    #
    # 1. Try a direct push first using the ``PRE_COMMIT`` PAT (if
    #    configured). When the PAT belongs to a user with bypass
    #    permission this is the fast path — bump lands on main
    #    immediately, single commit, no PR noise.
    # 2. If direct push isn't available or fails, fall back to opening
    #    a PR via ``peter-evans/create-pull-request``. CI runs against
    #    the PR, branch protection is satisfied, the PR auto-merges
    #    when checks pass (requires repo-level "allow auto-merge"
    #    setting). If auto-merge isn't enabled the PR sits open until
    #    a human merges it — versions never silently drift.
    #
    # Idempotent throughout: if ``__version__.py`` already matches the
    # release version (the common case for ad-hoc ``git tag`` pushes
    # where the dev loop bumped it before tagging) every step no-ops
    # and the job exits cleanly.
    runs-on: ubuntu-latest
    needs: [publish, build]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PRE_COMMIT || secrets.GITHUB_TOKEN }}
      - name: Decide whether bump is needed
        id: check
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          CURRENT=$(grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' src/langgraph_kit/__version__.py | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "main already at $VERSION — nothing to do."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "main at $CURRENT, release is $VERSION — bump required."
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply version bump locally
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          echo "__version__ = \"$VERSION\"" > src/langgraph_kit/__version__.py
      - name: Try direct push (fast path; requires bypass-capable PAT)
        id: direct
        if: steps.check.outputs.needed == 'true' && env.HAS_PAT == 'true'
        env:
          HAS_PAT: ${{ secrets.PRE_COMMIT != '' }}
          VERSION: ${{ steps.check.outputs.version }}
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/langgraph_kit/__version__.py
          git commit -m "chore: bump __version__ to $VERSION [skip ci]"
          if git push origin main; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Direct push rejected (likely branch protection); falling back to PR."
            git reset --hard HEAD~1
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Open bump PR (fallback path)
        if: steps.check.outputs.needed == 'true' && (env.HAS_PAT != 'true' || steps.direct.outputs.pushed != 'true')
        env:
          HAS_PAT: ${{ secrets.PRE_COMMIT != '' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PRE_COMMIT || secrets.GITHUB_TOKEN }}
          branch: chore/bump-version-${{ steps.check.outputs.version }}
          base: main
          delete-branch: true
          commit-message: "chore: bump __version__ to ${{ steps.check.outputs.version }}"
          title: "chore: bump __version__ to ${{ steps.check.outputs.version }}"
          body: |
            Automated post-release version bump after publishing v${{ steps.check.outputs.version }} to PyPI.

            The published wheel already carries the correct constant (the build
            job rewrites `__version__.py` before `uv build`); this PR keeps
            `main`'s source in sync so future development starts from the
            post-release number.

            Auto-generated by `.github/workflows/release.yml` (`bump-main` job).
          labels: internal
      - name: Annotate result
        if: always() && steps.check.outputs.needed == 'true'
        run: |
          if [ "${{ steps.direct.outputs.pushed }}" = "true" ]; then
            echo "::notice::Bumped __version__ to ${{ steps.check.outputs.version }} via direct push."
          else
            echo "::notice::Opened PR to bump __version__ to ${{ steps.check.outputs.version }} (direct push not available — review and merge the PR labeled 'internal')."
          fi
